<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetLab Pro — Admin Control Panel</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@600;700;800&display=swap');
:root{--bg:#0c0f14;--bg2:#12161e;--bg3:#181d28;--bg4:#1c2230;--cyan:#3ecfff;--green:#34d399;--orange:#f59e0b;--red:#ef4444;--purple:#a78bfa;--t1:#edf2f7;--t2:#94a3b8;--t3:#4a5568;--bd:#1e2738;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;min-height:100vh}
.top{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(12,15,20,.95);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px;z-index:100;backdrop-filter:blur(20px)}.top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(239,68,68,.4),transparent)}
.logo{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;flex:1}.logo span{color:var(--red)}.badge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:1.5px;margin-left:10px}
.top-r{display:flex;align-items:center;gap:14px}.btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:7px 16px;border:1px solid;border-radius:6px;background:transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}.btn-r{color:var(--red);border-color:rgba(239,68,68,.3)}.btn-r:hover{border-color:var(--red);background:rgba(239,68,68,.08)}.btn-c{color:var(--cyan);border-color:rgba(62,207,255,.3)}.btn-c:hover{border-color:var(--cyan);background:rgba(62,207,255,.08)}.btn-g{color:var(--green);border-color:rgba(52,211,153,.3)}.btn-g:hover{border-color:var(--green);background:rgba(52,211,153,.08)}.btn-o{color:var(--orange);border-color:rgba(245,158,11,.3)}.btn-o:hover{border-color:var(--orange);background:rgba(245,158,11,.08)}
.wrap{max-width:1440px;margin:72px auto 40px;padding:0 20px}
#auth-gate{display:flex;align-items:center;justify-content:center;min-height:80vh}#auth-gate .card{max-width:360px;width:100%}#auth-gate input{width:100%;padding:11px 14px;margin:5px 0;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}#auth-gate input:focus{border-color:var(--red)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}.sc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden}.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}.sc.c::before{background:var(--cyan)}.sc.g::before{background:var(--green)}.sc.o::before{background:var(--orange)}.sc.r::before{background:var(--red)}.sc.p::before{background:var(--purple)}.sl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:6px}.sv{font-family:'Sora',sans-serif;font-size:28px;font-weight:800}.ss{font-size:11px;color:var(--t2);margin-top:3px}
.card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:22px;margin-bottom:20px}.ct{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;color:var(--t2)}
.tabs{display:flex;gap:2px;margin-bottom:18px;flex-wrap:wrap}.tab{padding:9px 18px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:var(--bg4);border:1px solid var(--bd);color:var(--t3);cursor:pointer;transition:all .2s;border-radius:6px}.tab:hover{color:var(--t2)}.tab.on{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.3)}
table{width:100%;border-collapse:collapse}th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);padding:9px 10px;border-bottom:1px solid var(--bd)}td{padding:10px;border-bottom:1px solid rgba(30,39,56,.5);font-size:12px;color:var(--t2)}tr:hover td{background:rgba(62,207,255,.02)}.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}.tg{background:rgba(52,211,153,.12);color:var(--green)}.tr{background:rgba(239,68,68,.12);color:var(--red)}.tc{background:rgba(62,207,255,.12);color:var(--cyan)}.to{background:rgba(245,158,11,.12);color:var(--orange)}.tp{background:rgba(167,139,250,.12);color:var(--purple)}
.bc{display:flex;flex-direction:column;gap:6px}.br{display:flex;align-items:center;gap:10px}.bl{width:100px;font-size:11px;color:var(--t2);text-align:right;flex-shrink:0}.bt{flex:1;height:22px;background:var(--bg2);border-radius:3px;overflow:hidden}.bf{height:100%;border-radius:3px;transition:width .6s;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:#fff}.bf.c{background:linear-gradient(90deg,rgba(62,207,255,.6),rgba(62,207,255,.25))}.bf.g{background:linear-gradient(90deg,rgba(52,211,153,.6),rgba(52,211,153,.25))}.bf.o{background:linear-gradient(90deg,rgba(245,158,11,.6),rgba(245,158,11,.25))}.bf.r{background:linear-gradient(90deg,rgba(239,68,68,.6),rgba(239,68,68,.25))}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}@media(max-width:768px){.g2{grid-template-columns:1fr}}
.ld{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.spinner{width:28px;height:28px;border:3px solid var(--bd);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}@keyframes spin{to{transform:rotate(360deg)}}.empty{text-align:center;padding:30px;color:var(--t3);font-size:13px}#admin-content{display:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}.modal{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:28px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--bg);flex-shrink:0;overflow:hidden}.av img{width:100%;height:100%;object-fit:cover}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="top"><div class="logo">BET<span>LAB</span><span class="badge">ADMIN</span></div><div class="top-r"><span id="adm-email" class="mono" style="color:var(--t3);font-size:10px"></span><button class="btn btn-c" onclick="location.href='index.html'">← App</button><button class="btn btn-r" onclick="auth.signOut();location.reload()">Sign Out</button></div></div>
<div id="auth-gate" style="display:flex;align-items:center;justify-content:center;min-height:80vh;text-align:center"><div class="card" style="max-width:360px"><div style="font-size:36px;margin-bottom:14px">🔐</div><div class="ct" style="color:var(--red)">Admin Panel</div><div id="a-msg" style="font-size:12px;color:var(--t2);margin:12px 0">Checking access...</div><div class="spinner"></div><div style="margin-top:16px;font-size:11px;color:var(--t3)">You must be logged in as an admin on the main site first.</div><button class="btn btn-c" onclick="location='index.html'" style="width:100%;margin-top:12px;padding:10px">← Go to Main Site & Log In</button></div></div>
<div id="admin-content" class="wrap"><div class="sg" id="stats-row"></div><div class="tabs" id="main-tabs"></div><div id="tab-content"></div></div>
<div id="user-modal" style="display:none"></div>
<script>
const firebaseConfig={apiKey:"AIzaSyCHEuYOHVAi8MtnW8vnADfSTnbwo7uYYyM",authDomain:"betlab-pro.firebaseapp.com",projectId:"betlab-pro",storageBucket:"betlab-pro.firebasestorage.app",messagingSenderId:"367140208884",appId:"1:367140208884:web:cf50fd65fbf55fc9039ea1"};
firebase.initializeApp(firebaseConfig);const auth=firebase.auth(),db=firebase.firestore();
let _users=[],_analytics=[],_pageViews=[],_visitors=[];
const esc=s=>{if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML};
const fmtDate=ts=>ts?new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fmtTime=ts=>ts?new Date(ts).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
const fmtDur=ms=>{if(!ms||ms<1000)return'0s';const s=Math.floor(ms/1000);if(s<60)return s+'s';const m=Math.floor(s/60);if(m<60)return m+'m '+s%60+'s';return Math.floor(m/60)+'h '+m%60+'m'};
const parseBrowser=ua=>{if(!ua)return'Unknown';if(ua.includes('Edg/'))return'Edge';if(ua.includes('OPR/')||ua.includes('Opera'))return'Opera';if(ua.includes('Chrome/'))return'Chrome';if(ua.includes('Safari/')&&!ua.includes('Chrome'))return'Safari';if(ua.includes('Firefox/'))return'Firefox';return'Other'};
const parseDevice=ua=>{if(!ua)return'Unknown';if(/Mobile|Android|iPhone/i.test(ua))return'Mobile';if(/iPad|Tablet/i.test(ua))return'Tablet';return'Desktop'};

auth.onAuthStateChanged(async u=>{if(u){try{const d=await db.collection('users').doc(u.uid).get();if(d.exists&&d.data().role==='admin'){showAdmin(u);return;}}catch(e){}}document.getElementById('a-msg').textContent='Access denied. Log in as admin on the main site first.';document.getElementById('a-msg').style.color='var(--red)';});
async function showAdmin(user){document.getElementById('auth-gate').style.display='none';document.getElementById('admin-content').style.display='block';document.getElementById('adm-email').textContent=user.email;await loadAll()}

const TABS=[{id:'users',label:'Users',icon:'👥'},{id:'online',label:'Online Now',icon:'🟢'},{id:'visitors',label:'Visitors',icon:'👁️'},{id:'pages',label:'Pages',icon:'📊'},{id:'activity',label:'Activity',icon:'📋'}];
let currentTab='users';
function renderTabs(){document.getElementById('main-tabs').innerHTML=TABS.map(t=>`<div class="tab ${t.id===currentTab?'on':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</div>`).join('')}
function switchTab(id){currentTab=id;renderTabs();renderTabContent()}

async function loadAll(){renderTabs();try{const uS=await db.collection('users').get();_users=uS.docs.map(d=>({uid:d.id,...d.data()}));const td=new Date();td.setDate(td.getDate()-30);const aS=await db.collection('analytics').where('timestamp','>=',td).orderBy('timestamp','desc').limit(5000).get();_analytics=aS.docs.map(d=>({id:d.id,...d.data()}));try{const pS=await db.collection('pageviews').orderBy('timestamp','desc').limit(5000).get();_pageViews=pS.docs.map(d=>({id:d.id,...d.data()}))}catch(e){_pageViews=[]}try{const vS=await db.collection('visitors').orderBy('lastSeen','desc').limit(500).get();_visitors=vS.docs.map(d=>({id:d.id,...d.data()}))}catch(e){_visitors=[]}}catch(e){console.error('Load:',e)}renderStats();renderTabContent()}

function renderStats(){const now=Date.now(),day=864e5,week=7*day;const at=_users.filter(u=>(u.lastActive||u.lastLogin||0)>now-day).length;const sw=_users.filter(u=>(u.created||0)>now-week).length;const on=_visitors.filter(v=>v.online&&v.lastSeen&&(v.lastSeen.toDate?v.lastSeen.toDate().getTime():0)>now-12e4).length;const bl=_users.filter(u=>u.blocked).length;
document.getElementById('stats-row').innerHTML=`<div class="sc c"><div class="sl">Total Users</div><div class="sv">${_users.length}</div><div class="ss">${bl} blocked</div></div><div class="sc g"><div class="sl">Online Now</div><div class="sv"><span class="ld"></span>${on}</div><div class="ss">Active visitors</div></div><div class="sc o"><div class="sl">Active Today</div><div class="sv">${at}</div><div class="ss">Last 24h</div></div><div class="sc r"><div class="sl">Signups (7d)</div><div class="sv">${sw}</div><div class="ss">This week</div></div><div class="sc p"><div class="sl">Page Views</div><div class="sv">${_pageViews.length}</div><div class="ss">Last 30 days</div></div>`}

function renderTabContent(){const c=document.getElementById('tab-content');if(currentTab==='users')renderUsersTab(c);else if(currentTab==='online')renderOnlineTab(c);else if(currentTab==='visitors')renderVisitorsTab(c);else if(currentTab==='pages')renderPagesTab(c);else if(currentTab==='activity')renderActivityTab(c)}

function renderUsersTab(c){const sorted=[..._users].sort((a,b)=>(b.lastLogin||0)-(a.lastLogin||0));c.innerHTML=`<div class="card"><div class="ct"><span class="ld"></span>Registered Users (${_users.length})</div><div style="overflow-x:auto"><table><thead><tr><th></th><th>Name</th><th>Username</th><th>Email</th><th>Phone</th><th>Country</th><th>Status</th><th>Last Active</th><th>Actions</th></tr></thead><tbody>${sorted.map(u=>{const st=u.blocked?'tr':(u.online?'tg':'tc');const stx=u.blocked?'BLOCKED':(u.online?'ONLINE':'OFFLINE');const av=u.photoURL?`<div class="av"><img src="${esc(u.photoURL)}"></div>`:`<div class="av" style="background:${u.color||'#3ecfff'}">${(u.name||'?').charAt(0).toUpperCase()}</div>`;return`<tr><td>${av}</td><td style="font-weight:600;color:var(--t1)">${esc(u.name||'—')}</td><td class="mono" style="color:var(--cyan)">@${esc(u.username||'—')}</td><td class="mono">${esc(u.email||'—')}</td><td class="mono">${esc(u.phone||'—')}</td><td>${esc(u.country||'—')}</td><td><span class="tag ${st}">${stx}</span></td><td class="mono" style="font-size:10px">${fmtTime(u.lastActive||u.lastLogin)}</td><td><button class="btn btn-c" style="padding:4px 10px;font-size:9px" onclick="viewUser('${u.uid}')">View</button> ${u.blocked?`<button class="btn btn-g" style="padding:4px 10px;font-size:9px" onclick="toggleBlock('${u.uid}',false)">Unblock</button>`:`<button class="btn btn-o" style="padding:4px 10px;font-size:9px" onclick="toggleBlock('${u.uid}',true)">Block</button>`} ${u.role!=='admin'?`<button class="btn btn-r" style="padding:4px 10px;font-size:9px" onclick="deleteUser('${u.uid}','${esc(u.name)}')">Delete</button>`:''}</td></tr>`}).join('')}</tbody></table></div></div>`}

function renderOnlineTab(c){const now=Date.now();const ov=_visitors.filter(v=>v.online&&v.lastSeen&&(v.lastSeen.toDate?v.lastSeen.toDate().getTime():0)>now-12e4);const matched=ov.map(v=>{const user=v.uid?_users.find(u=>u.uid===v.uid):null;const sd=v.sessionStart?now-(typeof v.sessionStart==='number'?v.sessionStart:v.sessionStart.toDate?.().getTime()||now):0;return{...v,user,sd}});c.innerHTML=`<div class="card"><div class="ct"><span class="ld"></span>Online Now (${matched.length})</div><div style="overflow-x:auto"><table><thead><tr><th>User</th><th>Type</th><th>Device</th><th>Browser</th><th>Screen</th><th>Session</th><th>Last Seen</th></tr></thead><tbody>${matched.length===0?'<tr><td colspan="7" class="empty">No one online</td></tr>':matched.map(v=>`<tr><td style="font-weight:600;color:var(--t1)">${v.user?esc(v.user.name)+' <span class="tag tg">USER</span>':'<span class="tag to">VISITOR</span> '+esc(v.id?.substring(0,12))}</td><td>${v.user?'Registered':'Anonymous'}</td><td>${parseDevice(v.userAgent)}</td><td>${parseBrowser(v.userAgent)}</td><td class="mono">${esc(v.screen||'—')}</td><td style="font-weight:600;color:var(--cyan)">${fmtDur(v.sd)}</td><td class="mono" style="font-size:10px">${v.lastSeen?.toDate?fmtTime(v.lastSeen.toDate().getTime()):'—'}</td></tr>`).join('')}</tbody></table></div></div>`}

function renderVisitorsTab(c){const all=[..._visitors].sort((a,b)=>{const ta=a.lastSeen?.toDate?.().getTime()||0;const tb=b.lastSeen?.toDate?.().getTime()||0;return tb-ta});c.innerHTML=`<div class="card"><div class="ct">All Visitors (${all.length})</div><p style="font-size:12px;color:var(--t3);margin-bottom:14px">Includes anonymous visitors who never registered.</p><div style="overflow-x:auto"><table><thead><tr><th>Visitor ID</th><th>User</th><th>Device</th><th>Browser</th><th>Lang</th><th>Status</th><th>Session</th><th>Last Seen</th></tr></thead><tbody>${all.map(v=>{const user=v.uid?_users.find(u=>u.uid===v.uid):null;const dur=v.sessionDuration||0;const isOn=v.online&&v.lastSeen&&(v.lastSeen.toDate?v.lastSeen.toDate().getTime():0)>Date.now()-12e4;return`<tr><td class="mono" style="font-size:10px">${esc(v.id?.substring(0,16))}</td><td>${user?'<span style="color:var(--cyan)">'+esc(user.name)+'</span>':'<span style="color:var(--t3)">Anonymous</span>'}</td><td>${parseDevice(v.userAgent)}</td><td>${parseBrowser(v.userAgent)}</td><td>${esc(v.lang||'—')}</td><td><span class="tag ${isOn?'tg':'tr'}">${isOn?'ONLINE':'OFFLINE'}</span></td><td class="mono">${fmtDur(dur)}</td><td class="mono" style="font-size:10px">${v.lastSeen?.toDate?fmtTime(v.lastSeen.toDate().getTime()):'—'}</td></tr>`}).join('')}</tbody></table></div></div>`}

function renderPagesTab(c){const pc={},pd={};_pageViews.forEach(pv=>{const p=pv.page||'?';pc[p]=(pc[p]||0)+1;pd[p]=(pd[p]||0)+(pv.duration||0)});const pl=Object.keys(pc).sort((a,b)=>pc[b]-pc[a]);const mx=Math.max(...Object.values(pc),1);c.innerHTML=`<div class="g2"><div class="card"><div class="ct">Top Pages</div><div class="bc">${pl.slice(0,15).map(p=>{const pct=(pc[p]/mx*100).toFixed(0);const avg=pc[p]>0?fmtDur(pd[p]/pc[p]):'0s';return`<div class="br"><div class="bl">${esc(p)}</div><div class="bt"><div class="bf c" style="width:${Math.max(pct,2)}%">${pc[p]} (avg ${avg})</div></div></div>`}).join('')}</div></div><div class="card"><div class="ct">Browsers</div><div class="bc">${buildChart('userAgent',parseBrowser,'c')}</div></div></div><div class="g2"><div class="card"><div class="ct">Devices</div><div class="bc">${buildChart('userAgent',parseDevice,'g')}</div></div><div class="card"><div class="ct">Activity by Hour</div><div class="bc">${buildHourChart()}</div></div></div>`}
function buildChart(field,parser,color){const counts={};[..._analytics,..._visitors].forEach(e=>{const val=parser(e[field]||e.userAgent);counts[val]=(counts[val]||0)+1});const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);const mx=Math.max(...sorted.map(s=>s[1]),1);return sorted.map(([l,c])=>`<div class="br"><div class="bl">${esc(l)}</div><div class="bt"><div class="bf ${color}" style="width:${Math.max(c/mx*100,2).toFixed(0)}%">${c}</div></div></div>`).join('')}
function buildHourChart(){const h={};for(let i=0;i<24;i++)h[i]=0;_analytics.forEach(e=>{const ts=e.timestamp?.toDate?.();if(ts)h[ts.getHours()]++});const mx=Math.max(...Object.values(h),1);return Object.entries(h).map(([hr,c])=>`<div class="br"><div class="bl">${hr.toString().padStart(2,'0')}:00</div><div class="bt"><div class="bf o" style="width:${Math.max(c/mx*100,2).toFixed(0)}%">${c}</div></div></div>`).join('')}

function renderActivityTab(c){const recent=_analytics.slice(0,150);c.innerHTML=`<div class="card"><div class="ct">Recent Activity (${recent.length})</div><div style="overflow-x:auto"><table><thead><tr><th>Time</th><th>Event</th><th>User</th><th>Device</th></tr></thead><tbody>${recent.length===0?'<tr><td colspan="4" class="empty">No activity</td></tr>':recent.map(e=>{const ts=e.timestamp?.toDate?.()||new Date();const user=e.uid&&e.uid!=='anonymous'?_users.find(u=>u.uid===e.uid):null;const et=e.event==='signup'?'tg':e.event==='login'?'tc':e.event==='session_start'?'to':'tp';return`<tr><td class="mono" style="font-size:10px">${ts.toLocaleString('en-GB')}</td><td><span class="tag ${et}">${esc(e.event)}</span></td><td>${user?esc(user.name):'<span style="color:var(--t3)">'+(e.uid||'anon').substring(0,12)+'</span>'}</td><td style="font-size:11px">${esc(e.screen||'')} · ${parseBrowser(e.userAgent)}</td></tr>`}).join('')}</tbody></table></div></div>`}

function viewUser(uid){const u=_users.find(x=>x.uid===uid);if(!u)return;const av=u.photoURL?`<img src="${esc(u.photoURL)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--bd)">`:`<div style="width:80px;height:80px;border-radius:50%;background:${u.color||'var(--cyan)'};display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:32px;font-weight:800;color:var(--bg)">${(u.name||'?').charAt(0).toUpperCase()}</div>`;const upv=_pageViews.filter(pv=>pv.uid===uid);const tt=upv.reduce((s,pv)=>s+(pv.duration||0),0);const pcs={};upv.forEach(pv=>{pcs[pv.page||'?']=(pcs[pv.page||'?']||0)+1});const tp=Object.entries(pcs).sort((a,b)=>b[1]-a[1]).slice(0,8);
document.getElementById('user-modal').style.display='block';document.getElementById('user-modal').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal"><div onclick="closeModal()" style="position:absolute;top:12px;right:16px;font-size:20px;cursor:pointer;color:var(--t3)">✕</div><div style="text-align:center;margin-bottom:20px">${av}<div style="font-family:'Sora',sans-serif;font-size:20px;font-weight:800;margin-top:10px">${esc(u.name)}</div><div class="mono" style="color:var(--cyan);font-size:12px">@${esc(u.username||'—')}</div><div style="margin-top:6px"><span class="tag ${u.blocked?'tr':'tg'}">${u.blocked?'BLOCKED':'ACTIVE'}</span> <span class="tag ${u.role==='admin'?'tr':'tc'}">${(u.role||'user').toUpperCase()}</span></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;margin-bottom:16px"><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Email</span><br><span class="mono">${esc(u.email)}</span></div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Phone</span><br><span class="mono">${esc(u.phone||'—')}</span></div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Address</span><br>${esc(u.address||'—')}</div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">City / State</span><br>${esc(u.city||'')} ${esc(u.state||'')}</div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Country</span><br>${esc(u.country||'—')}</div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Balance</span><br><span style="color:var(--green);font-weight:700">${u.currency||'₦'}${(u.balance||0).toLocaleString('en',{minimumFractionDigits:2})}</span></div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Joined</span><br>${fmtDate(u.created)}</div><div style="background:var(--bg2);padding:10px;border-radius:8px"><span style="color:var(--t3)">Last Active</span><br>${fmtTime(u.lastActive||u.lastLogin)}</div></div><div style="background:var(--bg2);padding:12px;border-radius:8px;margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Page Activity (${upv.length} views · ${fmtDur(tt)} total)</div>${tp.length===0?'<div class="empty">No page data</div>':`<div class="bc">${tp.map(([p,cnt])=>{const mx=tp[0][1];return`<div class="br"><div class="bl">${esc(p)}</div><div class="bt"><div class="bf c" style="width:${Math.max(cnt/mx*100,2).toFixed(0)}%">${cnt}</div></div></div>`}).join('')}</div>`}</div><div style="display:flex;gap:8px;justify-content:center">${u.blocked?`<button class="btn btn-g" onclick="toggleBlock('${u.uid}',false);closeModal()">Unblock</button>`:`<button class="btn btn-o" onclick="toggleBlock('${u.uid}',true);closeModal()">Block</button>`} ${u.role!=='admin'?`<button class="btn btn-r" onclick="deleteUser('${u.uid}','${esc(u.name)}');closeModal()">Delete Account</button>`:''}</div></div></div>`}

function closeModal(){document.getElementById('user-modal').style.display='none';document.getElementById('user-modal').innerHTML=''}
async function toggleBlock(uid,block){if(!confirm((block?'Block':'Unblock')+' this user?'))return;try{await db.collection('users').doc(uid).update({blocked:block});const u=_users.find(x=>x.uid===uid);if(u)u.blocked=block;renderTabContent();renderStats()}catch(e){alert('Error: '+e.message)}}
async function deleteUser(uid,name){if(!confirm('Delete '+name+'? Cannot be undone.'))return;if(!confirm('Are you SURE?'))return;try{await db.collection('users').doc(uid).delete();_users=_users.filter(u=>u.uid!==uid);renderTabContent();renderStats()}catch(e){alert('Error: '+e.message)}}
setInterval(async()=>{if(document.getElementById('admin-content').style.display!=='none')await loadAll()},60000);
</script>
</body>
</html>
